name: 'Send Infrastructure Health Email'
description: 'Custom GitHub Action to send infrastructure health reports via email'
author: 'Shreya Tiwari'

inputs:
  gmail-app-password:
    description: 'Gmail App Password for authentication (16-character code from Google)'
    required: true
  environment:
    description: 'Environment to check (all, gcp, aws, azure)'
    required: false
    default: 'all'

outputs:
  email-sent:
    description: 'Whether the email was sent successfully'
    value: ${{ steps.send-email.outputs.email-sent }}
  screenshot-count:
    description: 'Number of screenshots captured'
    value: ${{ steps.send-email.outputs.screenshot-count }}

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Playwright dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2
    
    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    
    - name: Send Infrastructure Health Email
      id: send-email
      shell: bash
      env:
        GMAIL_APP_PASSWORD: ${{ inputs.gmail-app-password }}
        ENVIRONMENT_FILTER: ${{ inputs.environment }}
      run: |
        echo "Sending Infrastructure Health Report..."
        python main.py --schedule
        echo "email-sent=true" >> $GITHUB_OUTPUT
        echo "screenshot-count=$(ls screenshots/ 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: infrastructure-screenshots
        path: screenshots/
        retention-days: 7
