name: Infrastructure Health Report

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check (gcp, aws, azure, or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gcp
          - aws
          - azure
  
  # Scheduled trigger (runs at 9:00 AM UTC daily)
  schedule:
    - cron: '0 9 * * *'
  
  # Trigger on push to feature branches (for testing)
  push:
    branches:
      - feature/*

jobs:
  send-health-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Infrastructure Health Check
        env:
          # Gmail Configuration - Only sensitive data as secret
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          
          # Environment filter from workflow input
          ENVIRONMENT_FILTER: ${{ github.event.inputs.environment || 'all' }}
          
        run: |
          echo "Starting Infrastructure Health Check..."
          python main.py
          
      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-screenshots
          path: screenshots/
          retention-days: 7
          
      - name: Report Status
        if: always()
        run: |
          if [ ${{ job.status }} == "success" ]; then
            echo "✅ Infrastructure Health Report sent successfully!"
          else
            echo "❌ Failed to send Infrastructure Health Report"
          fi
