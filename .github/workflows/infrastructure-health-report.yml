name: Infrastructure Health Report

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        type: string
        default: 'Manual health check'
  
  # Scheduled trigger (runs at 1:55 PM UTC daily = 7:25 PM IST)
  schedule:
    - cron: '55 13 * * *'
  
  # Trigger on push to main or feature branches
  push:
    branches:
      - main
      - feature/*

jobs:
  send-health-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright and system dependencies
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run Infrastructure Health Check
        env:
          # Gmail Configuration - Only sensitive data as secret
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "Starting Infrastructure Health Check..."
          python main.py
          if [ $? -ne 0 ]; then
            echo "❌ Failed to send infrastructure health report"
            exit 1
          fi
          
      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-screenshots
          path: screenshots/
          retention-days: 7
          
      - name: Report Status
        if: always()
        run: |
          if [ ${{ job.status }} == "success" ]; then
            echo "✅ Infrastructure Health Report sent successfully!"
          else
            echo "❌ Failed to send Infrastructure Health Report"
          fi
